<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Consultant: Professional Simulation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; }
        #preview { margin-top: 20px; padding: 15px; background: #e8f6f3; border: 1px solid #27ae60; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>IELTS Mock: Professional Sponsorship</h2>
    <p><strong>Test Item:</strong> "Describe how your professional background prepares you for international sponsorship."</p>

    <div class="input-group">
        <label>1. Situation (Set the context with nominalization):</label>
        <input type="text" id="situation" placeholder="e.g., The ____________ of my professional career lies at the nexus of...">
    </div>

    <div class="input-group">
        <label>2. Task (Define objective using complex conjunction):</label>
        <input type="text" id="task" placeholder="e.g., ____________ I am aiming to transition, I must first...">
    </div>

    <div class="input-group">
        <label>3. Action (Use Inversion for emphasis):</label>
        <textarea id="action" placeholder="e.g., Not only have I ____________, but I also ____________."></textarea>
    </div>

    <div class="input-group">
        <label>4. Result & Reflection (Academic Register/Hedging):</label>
        <textarea id="result" placeholder="e.g., It would be more ____________ to suggest that this results in..."></textarea>
    </div>

    <div class="controls">
        <button onclick="previewResult()">Preview Result</button>
        <button onclick="calculateScore()">Submit & Score</button>
        <button onclick="nextLevel()">Next Competency Level</button>
    </div>

    <div id="preview"></div>
</div>

<script>
    function previewResult() {
        const s = document.getElementById('situation').value;
        const t = document.getElementById('task').value;
        const a = document.getElementById('action').value;
        const r = document.getElementById('result').value;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('preview').innerHTML = `<strong>Constructed Response:</strong><br>${s} ${t} ${a} ${r}`;
    }

    function calculateScore() {
        const inputs = [document.getElementById('situation').value, document.getElementById('task').value, document.getElementById('action').value, document.getElementById('result').value];
        const filled = inputs.filter(i => i.length > 20).length;
        const score = filled * 2 + 1; // Basic logic: 1-9 scale
        alert("Your Estimated Band Score: " + score + "/9. Practice more academic collocations to reach Band 9.");
    }

    function nextLevel() { alert("Advancing to Analytical Decision-Making Framework Level."); }
</script>
</body>
</html>
