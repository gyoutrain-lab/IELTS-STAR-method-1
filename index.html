<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Proficiency Drill: Global Consultant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .layer-box { background: #eef2f7; padding: 15px; border-left: 5px solid #2c3e50; margin: 10px 0; }
        button { background: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; }
        #status { font-weight: bold; color: #34495e; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="topic-title">Drill: Sponsorship Expectation</h2>
    
    <div class="layer-box">
        <p id="layer-prompt"><strong>Layer 1 (Direct Answer):</strong> State your strategic objective clearly. Listen to the model, then record your attempt.</p>
        <button onclick="playModel()">Listen to Model</button>
        <button onclick="toggleRecord()">Start/Stop Recording</button>
    </div>

    <div id="status">Status: Ready to drill</div>

    <div class="controls">
        <button onclick="prevTopic()">Previous</button>
        <button onclick="nextTopic()">Next Layer/Topic</button>
    </div>
</div>

<script>
    const drills = [
        { title: "Sponsorship Expectation", text: "When I evaluate the prospect of sponsorship, I view it through the lens of a strategic alliance rather than a simple employment opportunity." },
        { title: "The Triple-Win Framework", text: "My professional trajectory represents a mutually beneficial exchange between my career, the Australian sector, and Indonesia." }
    ];
    let current = 0;

    function playModel() {
        const u = new SpeechSynthesisUtterance(drills[current].text);
        window.speechSynthesis.speak(u);
        document.getElementById('status').innerText = "Status: Playing model answer...";
    }

    function toggleRecord() {
        document.getElementById('status').innerText = "Status: Recording your attempt (simulate with your voice)...";
        // Note: In a production environment, this integrates with the Web MediaRecorder API.
    }

    function nextTopic() {
        current = (current + 1) % drills.length;
        document.getElementById('topic-title').innerText = "Drill: " + drills[current].title;
        document.getElementById('status').innerText = "Status: New topic loaded.";
    }
</script>
</body>
</html>
