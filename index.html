<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Professional Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .drill-box { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #timer { font-size: 2em; color: #c0392b; font-weight: bold; text-align: center; }
        .script-area { background: #f8f9fa; padding: 20px; border-left: 5px solid #2c3e50; margin: 20px 0; min-height: 100px; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        button { padding: 15px 25px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .rec-btn { background: #27ae60; color: white; }
        .stop-btn { background: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="drill-box">
    <h2 id="topic">Drill: Sponsorship Expectation</h2>
    <div id="timer">02:00</div>
    
    <div class="script-area" id="script-display">
        "When I evaluate the prospect of sponsorship, I view it through the lens of a strategic alliance rather than a simple employment opportunity..."
    </div>

    <div class="controls">
        <button class="rec-btn" onclick="startDrill()">Start Drill & Record</button>
        <button class="stop-btn" onclick="stopDrill()">Stop & Save</button>
    </div>
    
    <audio id="playback" controls style="width: 100%; margin-top: 20px;"></audio>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let timeLeft = 120;

    function startDrill() {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks);
                document.getElementById('playback').src = URL.createObjectURL(audioBlob);
            };
            mediaRecorder.start();
            startTimer();
        });
    }

    function startTimer() {
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            if(timeLeft <= 0) clearInterval(interval);
        }, 1000);
    }

    function stopDrill() {
        mediaRecorder.stop();
        alert("Recording saved. Proceed to self-scoring.");
    }
</script>
</body>
</html>
